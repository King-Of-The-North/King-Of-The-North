syntax = "proto3";

package kotn.wallet.v1;

option go_package = "github.com/king-of-the-north/king-of-the-north/gen;walletv1";

// WalletService is the financial brain & ledger. All money values are integer
// minor units (kuruş) — never floats (ADR-0003). The Wallet service is the single
// owner of the Moka United integration.
service WalletService {
  // Gateway -> Wallet: compute the Day-Zero spendable limit from a deposit.
  rpc CalculateLimit(CalculateLimitRequest) returns (CalculateLimitResponse);
  // Gateway -> Wallet: read current account state for the app dashboard.
  rpc GetAccount(GetAccountRequest) returns (Account);
  // Gateway -> Wallet: validate + atomically settle a cart against available credit.
  rpc ValidateTransaction(ValidateTransactionRequest) returns (ValidateTransactionResponse);
  // Gateway -> Wallet: credit a user for running a P2P node (DePIN, ADR-0008).
  rpc CreditNodeReward(CreditNodeRewardRequest) returns (CreditNodeRewardResponse);
  // Gateway -> Wallet: move spendable credit from one user to another (atomic).
  rpc Transfer(TransferRequest) returns (TransferResponse);
  // Gateway -> Wallet: list a user's transactions, newest first (receipts/history).
  rpc ListTransactions(ListTransactionsRequest) returns (ListTransactionsResponse);

  // Device registry (P2P WebSocket + signed-pay auth; ADR-0006/0010).
  rpc EnrollDevice(EnrollDeviceRequest) returns (DeviceList);
  rpc ListDevices(ListDevicesRequest) returns (DeviceList);
  rpc RevokeDevice(RevokeDeviceRequest) returns (DeviceList);
  // Account recovery / device rebind: revoke all keys, enroll a new one (ADR-0011).
  rpc RebindDevices(RebindDevicesRequest) returns (DeviceList);

  // Offline spending vouchers (capped, pre-reserved; ADR-0012).
  rpc IssueVoucher(IssueVoucherRequest) returns (Voucher);
  rpc RedeemVoucher(RedeemVoucherRequest) returns (Voucher);
  rpc ExpireVouchers(ExpireVouchersRequest) returns (ExpireVouchersResponse);
  rpc ListVouchers(ListVouchersRequest) returns (VoucherList);
  // The wallet's voucher-signing public key, so a voucher can be verified offline.
  rpc GetVoucherPubKey(GetVoucherPubKeyRequest) returns (GetVoucherPubKeyResponse);
}

message CalculateLimitRequest {
  string user_id = 1;
  int64 deposit_minor = 2; // D, in kuruş
  double apy = 3; // r
  uint32 compounding_per_year = 4; // n
  uint32 lockup_years = 5; // t
  double risk_margin = 6; // m (0.10–0.15, fixed pool — ADR-0001)
}

message CalculateLimitResponse {
  int64 credit_limit_minor = 1; // L0
  int64 projected_yield_minor = 2; // Yp
  string lockup_end_date = 3; // RFC3339
}

message GetAccountRequest {
  string user_id = 1;
}

message Account {
  string user_id = 1;
  int64 principal_minor = 2;
  int64 projected_yield_minor = 3;
  int64 credit_limit_minor = 4;
  int64 available_credit_minor = 5;
  double ltv_ratio = 6;
  string lockup_end_date = 7;
  string pool_type = 8; // "fixed" only (ADR-0001)
}

message CartItem {
  string sku = 1;
  string name = 2;
  int64 price_minor = 3;
  uint32 quantity = 4;
}

message ValidateTransactionRequest {
  string user_id = 1;
  repeated CartItem items = 2;
  string other_trx_code = 3; // our internal id sent to Moka
}

message ValidateTransactionResponse {
  bool approved = 1;
  int64 remaining_credit_minor = 2;
  string moka_payment_id = 3;
  string decline_reason = 4;
}

message CreditNodeRewardRequest {
  string user_id = 1;
  // Opaque, signed contribution proof produced by the Gateway metering layer.
  bytes contribution_proof = 2;
}

message CreditNodeRewardResponse {
  int64 credited_minor = 1;
  int64 available_credit_minor = 2;
}

message TransferRequest {
  string from_user_id = 1;
  string to_user_id = 2;
  int64 amount_minor = 3; // kuruş
  string ref = 4; // caller-unique idempotency/audit key
}

message TransferResponse {
  int64 from_remaining_minor = 1; // sender available_credit after
  int64 to_available_minor = 2; // receiver available_credit after
  string from_trx_code = 3; // audit code, "<ref>:out"
  string to_trx_code = 4; // audit code, "<ref>:in"
}

message ListTransactionsRequest {
  string user_id = 1;
  uint32 limit = 2; // 0 = server default
}

message Transaction {
  string id = 1;
  string other_trx_code = 2;
  string moka_payment_id = 3;
  int64 amount_minor = 4;
  int32 payment_status = 5; // 0=Standby 1=Pre-Provision 2=Payment 3=Cancel 4=Full-Refund
  int32 trx_status = 6; // 0=Standby 1=Successful 2=Failed
  string created_at = 7; // RFC3339
}

message ListTransactionsResponse {
  repeated Transaction transactions = 1;
}

// --- Devices (ADR-0006/0010/0011) ---

message Device {
  bytes device_pubkey = 1; // Ed25519 (32 bytes)
  bool active = 2;
  string created_at = 3; // RFC3339
}

message DeviceList {
  string user_id = 1;
  repeated Device devices = 2; // active devices only
}

message EnrollDeviceRequest {
  string user_id = 1;
  bytes device_pubkey = 2;
}

message ListDevicesRequest {
  string user_id = 1;
}

message RevokeDeviceRequest {
  string user_id = 1;
  bytes device_pubkey = 2;
}

message RebindDevicesRequest {
  string user_id = 1;
  bytes new_device_pubkey = 2;
}

// --- Vouchers (ADR-0012) ---

message Voucher {
  string id = 1;
  string user_id = 2;
  int64 amount_minor = 3;
  string status = 4; // "issued" | "redeemed" | "expired"
  bytes nonce = 5;
  bytes sig = 6; // wallet's Ed25519 signature over the voucher payload
  string expires_at = 7; // RFC3339
  string issued_at = 8;
  string redeem_trx_code = 9; // set once redeemed
}

message IssueVoucherRequest {
  string user_id = 1;
  int64 amount_minor = 2;
  uint32 ttl_seconds = 3; // 0 = server default
}

message RedeemVoucherRequest {
  string voucher_id = 1;
  string other_trx_code = 2;
}

message ExpireVouchersRequest {}

message ExpireVouchersResponse {
  int32 expired_count = 1;
  int64 refunded_minor = 2;
}

message ListVouchersRequest {
  string user_id = 1;
}

message VoucherList {
  repeated Voucher vouchers = 1;
}

message GetVoucherPubKeyRequest {}

message GetVoucherPubKeyResponse {
  bytes voucher_pubkey = 1;
}
