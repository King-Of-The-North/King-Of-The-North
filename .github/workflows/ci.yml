name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.f.outputs.go }}
      python: ${{ steps.f.outputs.python }}
      js: ${{ steps.f.outputs.js }}
      proto: ${{ steps.f.outputs.proto }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: f
        with:
          filters: |
            go:
              - 'gateway/**'
              - 'wallet/**'
              - 'gen/**'
              - 'go.mod'
              - 'go.sum'
            python:
              - 'ai-biometric/**'
            js:
              - 'frontend/**'
              - 'mobile/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            proto:
              - 'proto/**'
              - 'buf.yaml'
              - 'buf.gen.yaml'

  go:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go build ./gateway/... ./wallet/... ./gen/...
      - run: go test ./gateway/... ./wallet/... ./gen/...
      - uses: golangci/golangci-lint-action@v7
        with:
          args: ./gateway/... ./wallet/...

  python:
    needs: changes
    if: ${{ needs.changes.outputs.python == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-biometric
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run pytest -q

  js:
    needs: changes
    if: ${{ needs.changes.outputs.js == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --if-present lint
      - run: pnpm --filter frontend build

  proto:
    needs: changes
    if: ${{ needs.changes.outputs.proto == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - run: buf lint
