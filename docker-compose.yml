# Local stack (hybrid model): Compose runs Postgres + backend services; the JS app you
# are actively editing runs natively (pnpm/Expo). See Taskfile.yml and CONTRIBUTING.md.
name: kotn

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kotn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kotn}
      POSTGRES_DB: ${POSTGRES_DB:-kotn}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Applied once on a fresh volume — bootstraps the wallet ledger schema.
      - ./wallet/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kotn} -d ${POSTGRES_DB:-kotn}"]
      interval: 5s
      timeout: 3s
      retries: 10

  wallet:
    build:
      context: .
      dockerfile: wallet/Dockerfile
    environment:
      WALLET_HTTP_PORT: "8081"
      DATABASE_URL: postgres://${POSTGRES_USER:-kotn}:${POSTGRES_PASSWORD:-kotn}@postgres:5432/${POSTGRES_DB:-kotn}?sslmode=disable
      MOKA_MOCK: ${MOKA_MOCK:-true}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      GATEWAY_HTTP_PORT: "8080"
      WALLET_ADDR: wallet:8081
    ports:
      - "8080:8080"
    depends_on:
      - wallet

  ai-biometric:
    build:
      context: ./ai-biometric
    ports:
      - "8082:8082"

volumes:
  pgdata:
