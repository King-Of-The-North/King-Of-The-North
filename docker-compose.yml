# Local backend stack. One command brings up Postgres + wallet + gateway:
#
#   docker compose up --build
#
# Then the REST API is on http://localhost:8080 (gateway) and the app you are
# actively editing (Expo / Next.js) runs natively and points at it.
# Host Postgres port is 5440 to avoid clashing with a native Postgres on 5432.
name: kotn

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kotn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kotn}
      POSTGRES_DB: ${POSTGRES_DB:-kotn}
    ports:
      - "${POSTGRES_PORT:-5440}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kotn} -d ${POSTGRES_DB:-kotn}"]
      interval: 5s
      timeout: 3s
      retries: 10

  wallet:
    build:
      context: .
      dockerfile: wallet/Dockerfile
    environment:
      WALLET_GRPC_PORT: "9091"
      WALLET_HTTP_PORT: "8081"
      # Service-to-service: reach Postgres by its compose name on the internal network.
      WALLET_DSN: postgres://${POSTGRES_USER:-kotn}:${POSTGRES_PASSWORD:-kotn}@postgres:5432/${POSTGRES_DB:-kotn}?sslmode=disable
    ports:
      - "9091:9091" # gRPC (gateway → wallet)
      - "8081:8081" # /healthz
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      GATEWAY_HTTP_PORT: "8080"
      WALLET_GRPC_ADDR: wallet:9091
    ports:
      - "8080:8080" # REST ingress (the apps call this)
    depends_on:
      - wallet

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # Browser calls the gateway on the host-exposed port, so use localhost.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    environment:
      # Server-side (route handlers / server components) reach the gateway over the
      # internal compose network, not the host.
      API_URL_INTERNAL: http://gateway:8080
    ports:
      - "3000:3000" # merchant/admin web app
    depends_on:
      - gateway

  # ai-biometric is off the critical path (auth is on-device, ADR-0006) and the
  # service is still empty — re-enable once it has a Dockerfile.
  # ai-biometric:
  #   build:
  #     context: ./ai-biometric
  #   ports:
  #     - "8082:8082"

volumes:
  pgdata:
